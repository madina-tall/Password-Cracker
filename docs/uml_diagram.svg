<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<title>Diagramme de classes UML du PasswordCracker</title>
<desc>Interface HashCracker implémentée par DictionaryHashCracker et BruteForceHashCracker, instanciées par HashCrackerFactory</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Interface -->
<rect x="200" y="40" width="280" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="340" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#26215C">HashCracker</text>
<text x="340" y="88" text-anchor="middle" font-size="12" fill="#3C3489">&#171;interface&#187; &#183; crack(hash): String</text>

<!-- Concrete classes -->
<rect x="50" y="170" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="180" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#04342C">DictionaryHashCracker</text>
<text x="180" y="210" text-anchor="middle" font-size="12" fill="#085041">recherche par dictionnaire</text>

<rect x="370" y="170" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="500" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#04342C">BruteForceHashCracker</text>
<text x="500" y="210" text-anchor="middle" font-size="12" fill="#085041">recherche exhaustive</text>

<!-- Factory -->
<rect x="220" y="280" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="340" y="302" text-anchor="middle" font-size="14" font-weight="bold" fill="#4A1B0C">HashCrackerFactory</text>
<text x="340" y="320" text-anchor="middle" font-size="12" fill="#712B13">create(method): HashCracker</text>

<!-- implements arrows -->
<line x1="180" y1="170" x2="235" y2="104" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="500" y1="170" x2="445" y2="104" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
<text x="150" y="140" text-anchor="middle" font-size="12" fill="#333">implémente</text>
<text x="535" y="140" text-anchor="middle" font-size="12" fill="#333">implémente</text>

<!-- creates arrows -->
<line x1="290" y1="280" x2="200" y2="226" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="390" y1="280" x2="480" y2="226" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
<text x="215" y="255" text-anchor="middle" font-size="12" fill="#333">instancie</text>
<text x="465" y="255" text-anchor="middle" font-size="12" fill="#333">instancie</text>

</svg>
